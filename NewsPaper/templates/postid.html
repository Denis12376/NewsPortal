{% extends 'flatpages/default.html' %}
{% load custom_filters %}
{% block title %}
Публикация № {{ post.id }}
{% endblock title %}
{% block content %}
<h3>{{ post.title|censor }}</h3>
<p><span style="color: #008000;">{{ post.created_at|date:'d M Y' }}<p/></span>
<p>{{ post.content|censor }}</p>
{% endblock content %}
